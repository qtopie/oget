name: Go

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [ '1.25' ]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Install dependencies
      run: go mod tidy

    - name: Run Tests
      run: go test -v ./...

  build-and-release:
    name: Build and Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build
      run: |
        VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
        COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
        LDFLAGS="-X github.com/qtopie/oget/pkg/oget.Version=$VERSION -X github.com/qtopie/oget/pkg/oget.Commit=$COMMIT"
        mkdir -p dist
        GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/oget_linux_amd64 ./cmd/main.go
        GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/oget_linux_arm64 ./cmd/main.go
        GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/oget_darwin_amd64 ./cmd/main.go
        GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/oget_darwin_arm64 ./cmd/main.go
        GOOS=windows GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/oget_windows_amd64.exe ./cmd/main.go

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/oget_linux_amd64
          dist/oget_linux_arm64
          dist/oget_darwin_amd64
          dist/oget_darwin_arm64
          dist/oget_windows_amd64.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
