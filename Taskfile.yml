version: '3'

vars:
  BINARY_NAME: oget
  MAIN_PATH: ./cmd/main.go

tasks:
  default:
    desc: List all available tasks
    cmds:
      - task --list

  build:
    desc: Build the oget binary
    cmds:
      - go build -v -o {{.BINARY_NAME}} {{.MAIN_PATH}}
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BINARY_NAME}}"

  run:
    desc: Build and run oget
    cmds:
      - task: build
      - ./{{.BINARY_NAME}} {{.CLI_ARGS}}

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  install:
    desc: Install oget binary to GOBIN
    cmds:
      - go install ./cmd

  fmt:
    desc: Format Go source code
    cmds:
      - go fmt ./...

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BINARY_NAME}} dist/
      - go clean

  release:
    desc: Build and package release binaries
    cmds:
      - mkdir -p dist
      # Linux
      - GOOS=linux GOARCH=amd64 go build -o dist/{{.BINARY_NAME}}_linux_amd64 {{.MAIN_PATH}}
      - GOOS=linux GOARCH=arm64 go build -o dist/{{.BINARY_NAME}}_linux_arm64 {{.MAIN_PATH}}
      # macOS
      - GOOS=darwin GOARCH=amd64 go build -o dist/{{.BINARY_NAME}}_darwin_amd64 {{.MAIN_PATH}}
      - GOOS=darwin GOARCH=arm64 go build -o dist/{{.BINARY_NAME}}_darwin_arm64 {{.MAIN_PATH}}
      # Windows
      - GOOS=windows GOARCH=amd64 go build -o dist/{{.BINARY_NAME}}_windows_amd64.exe {{.MAIN_PATH}}
      # Packaging
      - cd dist && for f in *; do tar -czvf "${f}.tar.gz" "$f"; done
